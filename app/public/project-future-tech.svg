<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d1b2a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.03"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="1050" cy="550" r="300" fill="#06b6d4" opacity="0.05"/>
  <circle cx="250" cy="150" r="200" fill="#06b6d4" opacity="0.08"/>
  <!-- Phone mockup -->
  <rect x="490" y="60" width="300" height="600" rx="30" fill="#0d0d0d" stroke="#333" stroke-width="2"/>
  <rect x="505" y="90" width="270" height="540" rx="5" fill="#111827"/>
  <!-- Status bar -->
  <text x="520" y="115" fill="#aaa" font-family="Arial" font-size="12">9:41</text>
  <!-- App header -->
  <rect x="505" y="125" width="270" height="50" fill="url(#accent)"/>
  <text x="555" y="156" fill="white" font-family="Arial, sans-serif" font-weight="bold" font-size="16">Future Tech</text>
  <!-- Welcome section -->
  <text x="520" y="200" fill="white" font-family="Arial" font-weight="bold" font-size="14">Welcome, Student</text>
  <text x="520" y="218" fill="#888" font-family="Arial" font-size="11">ATLAS Skill Tech University</text>
  <!-- Menu grid -->
  <rect x="515" y="235" width="75" height="75" rx="12" fill="url(#card)" stroke="#06b6d4" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="528" y="282" fill="#06b6d4" font-family="Arial" font-size="10">Timetable</text>
  <rect x="600" y="235" width="75" height="75" rx="12" fill="url(#card)" stroke="#06b6d4" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="622" y="282" fill="#06b6d4" font-family="Arial" font-size="10">Fees</text>
  <rect x="685" y="235" width="75" height="75" rx="12" fill="url(#card)" stroke="#06b6d4" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="698" y="282" fill="#06b6d4" font-family="Arial" font-size="10">Events</text>
  <rect x="515" y="320" width="75" height="75" rx="12" fill="url(#card)" stroke="#06b6d4" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="524" y="367" fill="#06b6d4" font-family="Arial" font-size="10">Electives</text>
  <rect x="600" y="320" width="75" height="75" rx="12" fill="url(#card)" stroke="#06b6d4" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="614" y="367" fill="#06b6d4" font-family="Arial" font-size="10">QR Scan</text>
  <rect x="685" y="320" width="75" height="75" rx="12" fill="url(#card)" stroke="#06b6d4" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="698" y="367" fill="#06b6d4" font-family="Arial" font-size="10">Profile</text>
  <!-- Upcoming section -->
  <text x="520" y="425" fill="white" font-family="Arial" font-weight="bold" font-size="12">Upcoming Events</text>
  <rect x="515" y="435" width="250" height="55" rx="8" fill="url(#card)" stroke="#06b6d4" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="530" y="458" fill="white" font-family="Arial" font-size="11">Tech Symposium 2024</text>
  <text x="530" y="478" fill="#06b6d4" font-family="Arial" font-size="10">Mar 15 - Scan QR to register</text>
  <rect x="515" y="498" width="250" height="55" rx="8" fill="url(#card)" stroke="#06b6d4" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="530" y="521" fill="white" font-family="Arial" font-size="11">Hackathon Challenge</text>
  <text x="530" y="541" fill="#06b6d4" font-family="Arial" font-size="10">Mar 22 - Register now</text>
  <!-- Nav bar -->
  <rect x="505" y="580" width="270" height="50" fill="#0d0d0d"/>
  <circle cx="555" cy="605" r="8" fill="#06b6d4" opacity="0.8"/>
  <circle cx="615" cy="605" r="8" fill="#555"/>
  <circle cx="675" cy="605" r="8" fill="#555"/>
  <circle cx="735" cy="605" r="8" fill="#555"/>
</svg>
